name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Wails bindings
        run: wails3 generate bindings

      - name: Build frontend
        working-directory: frontend
        run: npx vite build --mode production

      - name: Build Go binary
        run: go build -ldflags="-s -w" -o WinDownloader233.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDownloader233-windows
          path: WinDownloader233.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: WinDownloader233-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: WinDownloader233.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
